name: CI

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      force_fail:
        description: "Set FORCE_FAIL=true for the integration workload"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      runner_type:
        description: "Runner type"
        required: false
        default: "github-hosted"
        type: choice
        options:
          - "github-hosted"
          - "self-hosted"
          - "custom-image"

permissions:
  contents: read

jobs:
  integration-ci:
    name: Integration CI
    uses: ./.github/workflows/reusable-kind-integration-ci.yml
    with:
      force_fail: ${{ github.event.inputs.force_fail || 'false' }}
      runner_type: ${{ github.event.inputs.runner_type || 'github-hosted' }}
