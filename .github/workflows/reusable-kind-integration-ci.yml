name: Reusable Kind Integration CI

on:
  workflow_call:
    inputs:
      force_fail:
        description: "Set FORCE_FAIL=true for the integration workload"
        required: false
        default: "false"
        type: string
      runner_type:
        description: "Runner type: github-hosted | self-hosted | custom-image"
        required: false
        default: "github-hosted"
        type: string
      runner_label:
        description: "Runner label (ignored for github-hosted)"
        required: false
        default: "self-hosted"
        type: string

permissions:
  contents: read

jobs:
  pre-check:
    name: Pre-check
    runs-on: ${{ inputs.runner_type == 'github-hosted' && 'ubuntu-latest' || inputs.runner_type == 'custom-image' && 'ci-integration-runner' || inputs.runner_label }}
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1

      - name: Load CI env
        uses: ./.github/actions/load-env

      - name: Set up Python
        if: inputs.runner_type == 'github-hosted'
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: ${{ env.APP_REQUIREMENTS }}

      - name: Set up Helm
        if: inputs.runner_type == 'github-hosted'
        uses: Azure/setup-helm@bf6a7d304bc2fdb57e0331155b7ebf2c504acf0a # v4
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Install Python validation tools
        run: |
          python3 -m pip install --upgrade pip
          pip install -r app/requirements.txt "ruff==${RUFF_VERSION}" "bandit" "pip-audit"

      - name: Python syntax check
        run: python -m py_compile app/main.py

      - name: Ruff lint
        run: ruff check app

      - name: Dependency vulnerability scan (SCA)
        run: pip-audit -r app/requirements.txt

      - name: Bandit security scan (SAST)
        run: bandit -r app/

      - name: Validate shell scripts (ShellCheck)
        run: shellcheck scripts/*.sh

      - name: Validate integration test Helm chart
        run: |
          helm lint helm/integration-test
          helm template "${JOB_RELEASE_NAME}" helm/integration-test >/tmp/integration-test.yaml

  build:
    name: Build
    runs-on: ${{ inputs.runner_type == 'github-hosted' && 'ubuntu-latest' || inputs.runner_type == 'custom-image' && 'ci-integration-runner' || inputs.runner_label }}
    needs:
      - pre-check
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1

      - name: Load CI env
        uses: ./.github/actions/load-env

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build image with layer cache
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: app
          tags: ${{ env.IMAGE_NAME }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save Docker image
        run: docker save "${IMAGE_NAME}" -o app-image.tar

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: app-image
          path: app-image.tar
          retention-days: 7

  integration:
    name: Provision, Test, Collect, Cleanup
    runs-on: ${{ inputs.runner_type == 'github-hosted' && 'ubuntu-latest' || inputs.runner_type == 'custom-image' && 'ci-integration-runner' || inputs.runner_label }}
    needs:
      - build
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1

      - name: Load CI env
        uses: ./.github/actions/load-env

      - name: Download Docker image artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: app-image

      - name: Set up Helm
        if: inputs.runner_type == 'github-hosted'
        uses: Azure/setup-helm@bf6a7d304bc2fdb57e0331155b7ebf2c504acf0a # v4
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Set up kubectl
        if: inputs.runner_type == 'github-hosted'
        uses: Azure/setup-kubectl@c0c8b32d33a5244f1e5947304550403b63930415 # v4
        with:
          version: ${{ env.KUBECTL_VERSION }}

      - name: Install Kind (GitHub-hosted)
        if: inputs.runner_type == 'github-hosted'
        uses: helm/kind-action@a1b0e391336a6ee6713a0583f8c6240d70863de3 # v1.12.0
        with:
          version: ${{ env.KIND_VERSION }}
          cluster_name: ${{ env.CLUSTER_NAME }}
          wait: 120s

      - name: Create fresh Kind cluster
        if: inputs.runner_type != 'github-hosted'
        run: kind create cluster --name "${CLUSTER_NAME}" --wait 120s

      - name: Load workload image into Kind
        run: |
          docker load -i app-image.tar
          kind load docker-image "${IMAGE_NAME}" --name "${CLUSTER_NAME}"

      - name: Deploy PostgreSQL
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo update
          helm upgrade --install "${POSTGRES_RELEASE_NAME}" bitnami/postgresql \
            --version "${POSTGRES_CHART_VERSION}" \
            --namespace "${NAMESPACE}" \
            --set auth.database="${POSTGRES_DB}" \
            --set auth.username="${POSTGRES_USER}" \
            --set auth.password="${POSTGRES_PASSWORD}" \
            --set primary.persistence.enabled=false \
            --wait \
            --timeout 5m
          kubectl wait --namespace "${NAMESPACE}" \
            --for=condition=ready pod \
            --selector app.kubernetes.io/instance="${POSTGRES_RELEASE_NAME}" \
            --timeout=300s

      - name: Deploy Redis
        run: |
          helm upgrade --install "${REDIS_RELEASE_NAME}" bitnami/redis \
            --version "${REDIS_CHART_VERSION}" \
            --namespace "${NAMESPACE}" \
            --set architecture=standalone \
            --set auth.password="${REDIS_PASSWORD}" \
            --set master.persistence.enabled=false \
            --wait \
            --timeout 5m
          kubectl wait --namespace "${NAMESPACE}" \
            --for=condition=ready pod \
            --selector app.kubernetes.io/instance="${REDIS_RELEASE_NAME}" \
            --timeout=300s

      - name: Run integration test Job
        run: |
          helm upgrade --install "${JOB_RELEASE_NAME}" helm/integration-test \
            --namespace "${NAMESPACE}" \
            --set image.repository="${IMAGE_NAME%:*}" \
            --set image.tag="${IMAGE_NAME##*:}" \
            --set job.name="${JOB_NAME}" \
            --set job.forceFail="${{ inputs.force_fail }}" \
            --set postgres.host="${POSTGRES_HOST}" \
            --set postgres.port="${POSTGRES_PORT}" \
            --set postgres.database="${POSTGRES_DB}" \
            --set postgres.user="${POSTGRES_USER}" \
            --set postgres.password="${POSTGRES_PASSWORD}" \
            --set redis.host="${REDIS_HOST}" \
            --set redis.port="${REDIS_PORT}" \
            --set redis.password="${REDIS_PASSWORD}"
          for _ in {1..60}; do
            complete="$(kubectl get job "${JOB_NAME}" --namespace "${NAMESPACE}" -o jsonpath='{.status.conditions[?(@.type=="Complete")].status}')"
            failed="$(kubectl get job "${JOB_NAME}" --namespace "${NAMESPACE}" -o jsonpath='{.status.conditions[?(@.type=="Failed")].status}')"
            if [ "${complete}" = "True" ]; then
              echo "Integration Job completed successfully"
              exit 0
            fi
            if [ "${failed}" = "True" ]; then
              echo "Integration Job failed"
              kubectl describe job "${JOB_NAME}" --namespace "${NAMESPACE}"
              kubectl logs "job/${JOB_NAME}" --namespace "${NAMESPACE}" --all-containers=true || true
              exit 1
            fi
            sleep 5
          done
          echo "Timed out waiting for Integration Job"
          kubectl describe job "${JOB_NAME}" --namespace "${NAMESPACE}" || true
          kubectl logs "job/${JOB_NAME}" --namespace "${NAMESPACE}" --all-containers=true || true
          exit 1

      - name: Print integration test logs
        if: always()
        run: kubectl logs "job/${JOB_NAME}" --namespace "${NAMESPACE}" --all-containers=true || true

      - name: Collect artifacts
        if: always()
        run: scripts/collect-logs.sh

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: integration-artifacts
          path: artifacts/
          retention-days: 14
          if-no-files-found: warn

      - name: Cleanup infrastructure
        if: always()
        run: scripts/cleanup.sh

      - name: Write job summary
        if: always()
        run: |
          {
            echo "## Integration Test Results"
            echo ""
            echo "| Item | Value |"
            echo "|------|-------|"
            echo "| **Runner Type** | \`${{ inputs.runner_type }}\` |"
            echo "| **Cluster** | \`${CLUSTER_NAME}\` |"
            echo "| **Image** | \`${IMAGE_NAME}\` |"
            echo "| **Force Fail** | \`${{ inputs.force_fail }}\` |"
            echo ""
            if [ -f artifacts/integration-test.log ]; then
              echo "### Workload Logs"
              echo ""
              echo '```'
              tail -20 artifacts/integration-test.log
              echo '```'
            else
              echo "_No workload logs captured._"
            fi
          } >> "${GITHUB_STEP_SUMMARY}"
