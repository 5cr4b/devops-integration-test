image:
  repository: integration-workload
  tag: ci
  pullPolicy: Never

job:
  name: integration-test
  backoffLimit: 0
  ttlSecondsAfterFinished: 600
  activeDeadlineSeconds: 300
  forceFail: "false"

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

postgres:
  host: postgresql.default.svc.cluster.local
  port: "5432"
  database: app
  user: app
  password: app-password

redis:
  host: redis-master.default.svc.cluster.local
  port: "6379"
  password: redis-password
